sshd_port: 22
disable_ipv6: true
motd_message_url: "https://github.com/mtnstar/infra"

# UFW

# Enable or disable UFW
ufw_enabled: true

# Reset UFW rules before applying new ones
ufw_reset: true

# Default policies
ufw_default_policy_incoming: deny
ufw_default_policy_outgoing: allow
ufw_default_policy_routed: deny

# Logging level: on, off, low, medium, high, full
ufw_logging_level: low

# Default rules applied to all hosts
ufw_default_rules:
  - rule: allow
    port: "{{ sshd_port | default(22) }}"
    proto: tcp
    from_ip: "{{ secure_lan_cidr }}"
    comment: "SSH access"

# Group-specific rules (define in group_vars)
ufw_group_rules: []

# Host-specific rules (define in host_vars)
ufw_host_rules: []

# UFW application profiles to allow
ufw_applications: []

# networks
secure_lan_cidr: "10.0.0.0/24"
guest_lan_cidr: "192.168.1.0/24"
