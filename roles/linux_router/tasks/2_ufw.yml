---
- name: Disable IPv6 in UFW if not supported
  lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=no'
    state: present
  when: disable_ipv6

- name: Reload UFW after IPv6 config change
  command: ufw reload
  ignore_errors: yes

- name: Reset UFW to defaults (if requested)
  community.general.ufw:
    state: reset
  when: ufw_reset | default(false) | bool

- name: Set default UFW policies
  community.general.ufw:
    direction: "{{ policy_item.direction }}"
    policy: "{{ policy_item.policy }}"
  loop:
    - { direction: incoming, policy: "{{ ufw_default_policy_incoming }}" }
    - { direction: outgoing, policy: "{{ ufw_default_policy_outgoing }}" }
    - { direction: routed, policy: "{{ ufw_default_policy_routed }}" }
  loop_control:
    loop_var: policy_item

- name: Configure UFW logging
  community.general.ufw:
    logging: "{{ ufw_logging_level }}"
  when: ufw_logging_level is defined

- name: Apply default UFW rules (all hosts)
  community.general.ufw:
    rule: "{{ default_rule.rule }}"
    port: "{{ default_rule.port | default(omit) }}"
    proto: "{{ default_rule.proto | default(omit) }}"
    from_ip: "{{ default_rule.from_ip | default(omit) }}"
    to_ip: "{{ default_rule.to_ip | default(omit) }}"
    to_port: "{{ default_rule.to_port | default(omit) }}"
    interface: "{{ default_rule.interface | default(omit) }}"
    direction: "{{ default_rule.direction | default(omit) }}"
    comment: "{{ default_rule.comment | default(omit) }}"
  loop: "{{ ufw_default_rules }}"
  loop_control:
    loop_var: default_rule
    label: "{{ default_rule.comment | default(default_rule.port | default('rule')) }}"
  when: ufw_default_rules is defined and ufw_default_rules | length > 0

- name: Apply group-specific UFW rules
  community.general.ufw:
    rule: "{{ group_rule.rule }}"
    port: "{{ group_rule.port | default(omit) }}"
    proto: "{{ group_rule.proto | default(omit) }}"
    from_ip: "{{ group_rule.from_ip | default(omit) }}"
    to_ip: "{{ group_rule.to_ip | default(omit) }}"
    to_port: "{{ group_rule.to_port | default(omit) }}"
    interface: "{{ group_rule.interface | default(omit) }}"
    direction: "{{ group_rule.direction | default(omit) }}"
    comment: "{{ group_rule.comment | default(omit) }}"
  loop: "{{ ufw_group_rules }}"
  loop_control:
    loop_var: group_rule
    label: "{{ group_rule.comment | default(group_rule.port | default('rule')) }}"
  when: ufw_group_rules is defined and ufw_group_rules | length > 0

- name: Apply host-specific UFW rules
  community.general.ufw:
    rule: "{{ host_rule.rule }}"
    port: "{{ host_rule.port | default(omit) }}"
    proto: "{{ host_rule.proto | default(omit) }}"
    from_ip: "{{ host_rule.from_ip | default(omit) }}"
    to_ip: "{{ host_rule.to_ip | default(omit) }}"
    to_port: "{{ host_rule.to_port | default(omit) }}"
    interface: "{{ host_rule.interface | default(omit) }}"
    direction: "{{ host_rule.direction | default(omit) }}"
    comment: "{{ host_rule.comment | default(omit) }}"
  loop: "{{ ufw_host_rules }}"
  loop_control:
    loop_var: host_rule
    label: "{{ host_rule.comment | default(host_rule.port | default('rule')) }}"
  when: ufw_host_rules is defined and ufw_host_rules | length > 0

- name: Allow specific applications
  community.general.ufw:
    rule: allow
    name: "{{ app_name }}"
  loop: "{{ ufw_applications }}"
  loop_control:
    loop_var: app_name
    label: "{{ app_name }}"
  when: ufw_applications is defined and ufw_applications | length > 0

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: ufw_enabled | default(true) | bool

- name: Disable UFW
  community.general.ufw:
    state: disabled
  when: not (ufw_enabled | default(true) | bool)
