---
- name: Create WireGuard configuration directory
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: '0700'
    owner: root
    group: root

- name: Read WireGuard config file
  slurp:
    src: /etc/wireguard/wg0.conf
  register: wg_config

- name: Extract private key from config
  set_fact:
    wireguard_private_key: "{{ (wg_config.content | b64decode | regex_search('PrivateKey = (.+)', '\\1')) | first }}"
  when: wg_config is defined and wg_config.content is defined

- name: Generate WireGuard private key
  ansible.builtin.shell: |
    wg genkey
  register: wireguard_private_key_generated
  changed_when: false
  when: wireguard_private_key is not defined
  no_log: true

- name: Set private key fact
  ansible.builtin.set_fact:
    wireguard_private_key: "{{ wireguard_private_key_generated.stdout }}"
  when: wireguard_private_key is not defined
  no_log: true

- name: Generate WireGuard public key
  ansible.builtin.shell: |
    echo "{{ wireguard_private_key }}" | wg pubkey
  register: wireguard_public_key_generated
  changed_when: false
  no_log: true

- name: Display public key
  ansible.builtin.debug:
    msg: "WireGuard Public Key: {{ wireguard_public_key_generated.stdout }}"

- name: Deploy WireGuard interface configuration
  ansible.builtin.template:
    src: wg-interface.conf.j2
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    mode: '0600'
    owner: root
    group: root
  notify: Restart WireGuard

- name: Fetch WireGuard config from remote host
  fetch:
    src: /etc/wireguard/wg0.conf
    dest: "/tmp/wg0.conf"
    flat: yes

- name: Change ownership of fetched file
  delegate_to: localhost
  become: yes
  file:
    path: "/tmp/wg0.conf"
    owner: "{{ infra_admin_username }}"
    group: "{{ infra_admin_username }}"
    mode: '0600'
  run_once: true

- name: Encrypt the fetched file with Ansible Vault
  delegate_to: localhost
  become: yes
  become_user: "{{ infra_admin_username }}"
  command: ansible-vault encrypt /tmp/wg0.conf --output "{{ inventory_dir }}/wireguard_configs/wg0.conf.vault"
  environment:
    PATH: "{{ lookup('env', 'PATH') }}"
    ANSIBLE_VAULT_PASSWORD_FILE: "{{ lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') }}"
  ignore_errors: yes
  run_once: true

- name: Enable and start WireGuard interface
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: true
    state: started
