---
- name: Set UFW default forward policy to ACCEPT
  lineinfile:
    path: "/etc/default/ufw"
    regexp: "^DEFAULT_FORWARD_POLICY="
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
    backup: yes
  notify: reload ufw

- name: Check if NAT rules already exist in before.rules
  command: grep -q "NAT table rules for WireGuard" /etc/ufw/before.rules
  register: nat_rules_exist
  changed_when: false
  failed_when: false

- name: Add NAT masquerading rules to UFW before.rules
  blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: '^\*filter'
    marker: "# {mark} ANSIBLE MANAGED BLOCK - WireGuard NAT"
    block: |
      # NAT table rules for WireGuard
      *nat
      :POSTROUTING ACCEPT [0:0]
      -A POSTROUTING -s {{ wireguard_subnet }} -o {{ wireguard_external_interface }} -j MASQUERADE
      COMMIT
    backup: yes
  when: nat_rules_exist.rc != 0
  notify: reload ufw
