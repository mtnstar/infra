---
- name: Configure systemd-resolved to disable DNS stub listener
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
    insertafter: '^\[Resolve\]'
    create: yes
    backup: yes
  notify: restart systemd-resolved

- name: Ensure [Resolve] section exists in resolved.conf
  lineinfile:
    path: /etc/systemd/resolved.conf
    line: '[Resolve]'
    insertbefore: '^DNSStubListener='
    create: yes

- name: Symlink /etc/resolv.conf to systemd-resolved
  file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes
  become: yes

- name: Restart systemd-resolved service
  systemd:
    name: systemd-resolved
    state: restarted
